name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Guard against committed licensed X12 data
        run: npm run check:licensed-data
      - name: Type-check
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  dco:
    # Verify every commit in a PR carries a Signed-off-by line (DCO).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on PR commits
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list "$base..$head"); do
            if ! git log -1 --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "Commit $sha is missing a Signed-off-by line."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "DCO check failed. Sign commits with 'git commit -s'."
            exit 1
          fi
          echo "DCO check passed."
